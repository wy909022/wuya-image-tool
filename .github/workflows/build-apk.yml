name: 构建 Android APK

# ── 触发条件：手动触发 或 推送代码到 main 分支 ──
on:
  workflow_dispatch:        # 允许在 GitHub 网页上手动点击触发
  push:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  JAVA_VERSION: '17'

jobs:
  build:
    name: 打包 APK
    runs-on: ubuntu-latest
    timeout-minutes: 60      # 最长等待 60 分钟（首次需下载 Flutter SDK）

    steps:
      # ── 第一步：检出代码 ──
      - name: 检出代码
        uses: actions/checkout@v4

      # ── 第二步：安装 Python ──
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── 第三步：安装项目依赖 ──
      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 第四步：安装 Java（Android 打包必需） ──
      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      # ── 第五步：构建 APK ──
      # Flet 会自动下载 Flutter SDK 和 Android SDK（首次约 5-8 分钟）
      - name: 构建 APK
        run: |
          flet build apk mobile_app.py \
            --name "无涯图片爬取" \
            --android-package-name "com.wuya.imagetool" \
            --include-packages "requests"

      # ── 第六步：上传 APK 产物 ──
      # 构建完成后，APK 会出现在 build/apk/ 目录中
      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 无涯图片爬取-APK
          path: build/apk/*.apk
          retention-days: 30   # APK 保留 30 天，之后自动删除
