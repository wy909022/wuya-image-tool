name: 构建 Android APK

# ── 触发条件：手动触发 或 推送代码到 main 分支 ──
on:
  workflow_dispatch:        # 允许在 GitHub 网页上手动点击触发
  push:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.24.0'   # Flutter SDK 版本

jobs:
  build:
    name: 打包 APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 第一步：检出代码 ──
      - name: 检出代码
        uses: actions/checkout@v4

      # ── 第二步：安装 Python ──
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── 第三步：安装 Java（Android 打包必需） ──
      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # ── 第四步：安装 Flutter SDK ──
      - name: 安装 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      # ── 第五步：安装 Android SDK ──
      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      # ── 第六步：安装 Python 依赖 ──
      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 第七步：构建 APK ──
      - name: 构建 APK
        run: |
          flet build apk mobile_app.py \
            --product "无涯图片爬取" \
            --org "com.wuya.imagetool" \
            --include-packages "requests" \
            --verbose

      # ── 第八步：上传 APK 产物 ──
      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 无涯图片爬取-APK
          path: build/apk/*.apk
          retention-days: 30
