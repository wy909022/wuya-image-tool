name: 构建 Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.27.4'

jobs:
  build:
    name: 打包 APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 安装 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "=== Flet 版本 ==="
          flet --version
          echo "=== 文件列表 ==="
          ls -la
          echo "=== main.py 内容 ==="
          cat main.py

      - name: 构建 APK（捕获日志）
        run: |
          flet build apk --verbose 2>&1 | tee build-log.txt
        continue-on-error: true

      - name: 上传构建日志
        uses: actions/upload-artifact@v4
        with:
          name: 构建日志
          path: build-log.txt
          retention-days: 7

      - name: 上传 APK（如果成功）
        uses: actions/upload-artifact@v4
        with:
          name: 无涯图片爬取-APK
          path: build/apk/*.apk
          retention-days: 30
