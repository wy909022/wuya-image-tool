name: 构建 Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.41.7'

jobs:
  build:
    name: 打包 APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 安装 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 构建 APK
        run: |
          echo y | flet build apk --verbose 2>&1 | tee build-log.txt

      - name: 查找 APK 文件
        if: always()
        run: |
          echo "=== 搜索所有 .apk 文件 ==="
          find / -name "*.apk" -type f 2>/dev/null | head -20
          echo ""
          echo "=== 搜索所有 .aab 文件 ==="
          find / -name "*.aab" -type f 2>/dev/null | head -10
          echo ""
          echo "=== 当前目录结构 ==="
          ls -la
          echo ""
          echo "=== build 目录（如果存在）==="
          find build -type f 2>/dev/null || echo "(没有 build 目录)"

      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 构建日志
          path: build-log.txt
          retention-days: 7

      - name: 上传 APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 无涯图片爬取-APK
          path: "**/*.apk"
          retention-days: 30
          if-no-files-found: warn
